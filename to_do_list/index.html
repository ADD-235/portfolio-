<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" type="text/css" href="style.css">
<title>Ma To-Do List</title>
</head>
<body>

<div class="app">
  <h1>Ma To-Do List</h1>
  <p class="subtitle">Organise tes tâches simplement</p>

  <div class="input-row">
    <input type="text" id="taskInput" placeholder="Ajouter une tâche..." maxlength="100">
    <button id="addBtn">Ajouter</button>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">Toutes</button>
    <button class="filter-btn" data-filter="active">En cours</button>
    <button class="filter-btn" data-filter="completed">Terminées</button>
  </div>

  <ul id="taskList"></ul>

  <div class="footer">
    <span id="taskCount">0 tâche(s)</span>
    <button id="clearCompleted">Effacer les terminées</button>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
